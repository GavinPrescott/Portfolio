<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body id="top">
  <header class="site-header">
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}" class="nav-brand">{{ site.title }}</a>
      <button class="nav-toggle" aria-expanded="false" aria-controls="nav-links" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul id="nav-links" class="nav-links">
        <li><a href="{{ '/#about' | relative_url }}">About</a></li>
        <li><a href="{{ '/#projects' | relative_url }}">Projects</a></li>
        <li><a href="{{ '/#experience' | relative_url }}">Experience</a></li>
        <li><a href="{{ '/#skills' | relative_url }}">Skills</a></li>
        <li><a href="{{ '/#contact' | relative_url }}">Contact</a></li>
        <li><a href="{{ '/assets/resume.pdf' | relative_url }}" class="nav-cta">Resume</a></li>
      </ul>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.author | default: site.title }}</p>
      <p><a href="#top">Back to top ↑</a></p>
    </div>
  </footer>

  <script>
    // Mobile nav toggle
    document.querySelector('.nav-toggle').addEventListener('click', function () {
      var expanded = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', String(!expanded));
      document.querySelector('.nav-links').classList.toggle('open');
    });
  </script>
</body>
</html>
